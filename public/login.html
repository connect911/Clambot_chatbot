<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="Logo calmbot remove bg.png">
    <link href="https://fonts.googleapis.com/css2?family=Lato&family=Oswald&family=Ubuntu&display=swap" rel="stylesheet">
    <title>Login</title>
    <style>
        body {
            background-image: linear-gradient( rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.8)), url('bot\ background.jpg');
            background-repeat: no-repeat;
            background-size: cover;
            height: 100vh;
        }
        
        .page {
            background-color: rgba(214, 228, 218, 0.397);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            padding-bottom: 2rem;
            margin: 30em;
            margin-top: 5rem;
            border-radius: 18px;
        }
        
        #email {
            height: 39px;
            width: 200px;
            padding-left: 12px;
            border: 2px solid rgb(18, 19, 82);
            border-radius: 12px;
        }
        
        #pass {
            height: 39px;
            width: 200px;
            padding-left: 12px;
            border: 2px solid rgb(18, 19, 82);
            border-radius: 12px;
        }
        
        #submit {
            height: 35px;
            width: 120px;
            margin-left: 3rem;
            border-radius: 12px;
            background-color: rgba(17, 60, 100, 0.788);
            color: white;
            border: none;
        }
        
        h1 {
            font-family: 'Lato', sans-serif;
            color: black;
            text-align: center;
            line-height: 0%;
        }
        
        .logo {
            height: 140px;
            width: auto;
            margin: 0 auto 20px;
            display: block;
            margin-top: 0;
        }
        
        h4,
        h5 {
            font-family: 'Lato', sans-serif;
            color: black;
            text-align: center;
            line-height: 0.5;
        }
    </style>
</head>

<body>
    <div class="page">
        <form action="/login" method="POST">
            <img src="logo_calmbot-removebg-preview.png" class="logo">
            <h1>Login</h1><br>
            <label for="email">
                    <input type="email" name="email" id="email" placeholder="Email" required>
            </label><br><br>
            <label for="pass">
                    <input type="password" name="pass" id="pass" placeholder="Password" required>
            </label><br><br>
            <h4>Don't have account?<a href="sign_up.html">Register</a></h4>
            <h5>forgot password?<a href="forgot_password.html">Click here</a></h5>
            <input type="submit" name="submit" id="submit"><br>
        </form>
    </div>


</body>

</html>
