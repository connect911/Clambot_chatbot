<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="Logo calmbot remove bg.png">
    <link href="https://fonts.googleapis.com/css2?family=Lato&family=Oswald&family=Ubuntu&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <title>Account activation</title>
    <style>
        body {
            background-color: rgba(94, 90, 90, 0.822);
            background-repeat: no-repeat;
            background-size: cover;
            height: 100vh;
        }
        
        .page {
            background-color: rgba(214, 228, 218, 0.397);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            padding-bottom: 2rem;
            margin: 28em;
            margin-top: 5rem;
            border-radius: 18px;
        }
        
        #submit {
            height: 35px;
            width: 120px;
            margin-left: 5.5rem;
            border-radius: 12px;
            background-color: rgba(17, 60, 100, 0.788);
            color: white;
            border: none;
        }
        
        h2 {
            font-family: 'Lato', sans-serif;
            color: black;
            text-align: center;
        }
        
        h5 {
            font-family: 'Lato', sans-serif;
            color: black;
            text-align: center;
        }
        
        img {
            width: 90px;
            margin-left: 7em;
            margin-top: 0;
        }
        
        h4 {
            font-family: 'Lato', sans-serif;
            color: black;
            text-align: center;
        }
        
        a {
            color: white;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="page">
        <form action="" method="POST">
            <h2>Account Activated</h2>
            <img src="verified email logo.svg">
            <h4>Hi Laiba,</h4>
            <h5>Thank you, your email has been verified. Your account <br> is now active. Please use the link below to <br> login to your account.</h5>
            <button id="submit"><a href="login.html">Login</a></button>
            <br>
        </form>
    </div>


</body>

</html>
