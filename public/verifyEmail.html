<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="Logo calmbot remove bg.png">
    <link href="https://fonts.googleapis.com/css2?family=Lato&family=Oswald&family=Ubuntu&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <title>Email verification</title>
    <style>
        body {
            background-color: rgba(94, 90, 90, 0.822);
            background-repeat: no-repeat;
            background-size: cover;
            height: 100vh;
        }
        
        .page {
            background-color: rgba(214, 228, 218, 0.397);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            padding-bottom: 2rem;
            margin: 28em;
            margin-top: 5rem;
            border-radius: 18px;
        }
        
        #submit {
            height: 35px;
            width: 120px;
            margin-left: 4.5rem;
            border-radius: 12px;
            background-color: rgba(17, 60, 100, 0.788);
            color: white;
            border: none;
        }
        
        h2 {
            font-family: 'Lato', sans-serif;
            color: black;
            text-align: center;
        }
        
        h5 {
            font-family: 'Lato', sans-serif;
            color: black;
            text-align: center;
        }
        
        img {
            width: 80px;
            margin-left: 6em;
            margin-top: 3em;
        }
    </style>
</head>

<body>
    <div class="page">
        <form>
            <img src="verify email logo.svg">
            <h2>Please verify your email</h2>
            <h5>You're almost there! We sent an email to <br>your email address. Just click on <br> link to complete your registration. <br><br>Still can't find email?</h5>
            <button id="submit">Resend email</button><br>
        </form>
    </div>
</body>

</html>
