<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="Logo calmbot remove bg.png">
    <link href="https://fonts.googleapis.com/css2?family=Lato&family=Oswald&family=Ubuntu&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <title>Forgotten Password</title>
    <style>
        body {
            background-image: linear-gradient( rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.8)), url('bot\ background.jpg');
            background-repeat: no-repeat;
            background-size: cover;
            height: 100vh;
        }
        
        .page {
            background-color: rgba(214, 228, 218, 0.397);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            padding-bottom: 2rem;
            margin: 28em;
            margin-top: 5rem;
            border-radius: 18px;
        }
        
        #email {
            height: 39px;
            width: 200px;
            padding-left: 12px;
            margin-left: 20px;
            border: 2px solid rgb(18, 19, 82);
            border-radius: 12px;
        }
        
        #submit {
            height: 35px;
            width: 120px;
            margin-left: 4rem;
            border-radius: 12px;
            background-color: rgba(17, 60, 100, 0.788);
            color: white;
            border: none;
        }
        
        h1 {
            font-family: 'Lato', sans-serif;
            color: black;
            text-align: center;
        }
        
        h5 {
            font-family: 'Lato', sans-serif;
            color: black;
            text-align: center;
        }
        
        img {
            width: 80px;
            margin-left: 6.5em;
            margin-top: 3em;
        }
    </style>
</head>

<body>
    <div class="page">
        <form action="/forgetPassword" method="POST">
            <img src="error.svg">
            <h1>Forgot Password</h1>
            <h5>Enter your email and we'll send you a link to reset <br>your password.</h5>
            <label for="email">
                <input type="email" name="email" id="email" placeholder="Email" required>
            </label><br><br>
            <a href="resetPasswordLink.html">
                <input type="submit" name="submit" id="submit"><br>
            </a>

        </form>
    </div>
</body>

</html>
