<body>

    <div class="dashboard">
        <div class="navbar">
            <div class="profile-section" id="profileSection">
                <div class="logo">
                    <img src="Logo.png" alt="Profile Image" style="width: 70px; height:70px">
                </div>
                <!-- <div class="setting">
                    <a href="#" class="navbar-link"><img src="setting-2.png" alt="Setting" style="width: 30px; height:30px"></a>
                </div> -->
                <div class="favorities">
                    <a href="favorities.html"><img src="Favourities.png" alt="" style="width: 35px; height:35px"></a>
                </div>
                <div class="history">
                    <img src="History.png" id="his" alt="" style="width: 35px; height:35px">
                </div>
                <div class="About">
                    <a href="about.html"> <img src="info-circle.png" alt="" style="width: 30px; height:30px"></a>
                </div>
                <div class="Logout">
                    <div class="tooltip">
                        <a href="#" onclick="logout(); return false;"><img id="logout-icon" src="Logout.png" alt="" class="icon" style="width: 25px; height: 25px;"></a>
                        <span class="tooltiptext">Logout</span>
                    </div>
                </div>
                <div class="profile-circle" onclick="openProfileCard()">
                    <img id="profile-image" src="profile-circle.png" alt="Profile Picture" class="profile-image" style="width: 70px; height:70px">
                </div>
                <div id="profile-card" class="profile-card">
                    <span class="close" onclick="closeProfileCard()">&times;</span>
                    <img id="profile-image-large" src="default_profile_picture.jpg" alt="Profile Picture" class="profile-image-large" style="margin-right: 50px; margin-left: 50px;">
                    <div class="profile-info">
                        <p id="full_name" class="username"></p>
                    </div>
                    <div class="user-email">
                        <p id="email" class="mail"></p>
                    </div>
                    <a href="javascript:void(0);" class="update-profile-btn" onclick="openUpdateForm()">Update Profile</a>
                </div>

                <div id="update-profile-form" class="update-profile-form">
                    <span class="close" onclick="closeUpdateCard()">&times;</span>
                    <form id="updateForm" enctype="multipart/form-data">
                        <img src="logo_calmbot-removebg-preview.png" class="logo">
                        <label for="new_full_name">Username</label>
                        <input type="text" id="new_full_name" name="new_full_name" placeholder="New Username">
                        <input type="file" name="uploadfile" id="uploadfile">
                        <input type="submit" name="submit" value="Update Profile">
                    </form>
                </div>

                <script>
                    function openProfileCard() {
                        var profileCard = document.getElementById("profile-card");
                        profileCard.style.display = "block";
                        fetchUserProfile();
                    }

                    function closeProfileCard() {
                        var profileCard = document.getElementById("profile-card");
                        profileCard.style.display = "none";
                    }

                    function closeUpdateCard() {
                        var updateCard = document.getElementById("update-profile-form");
                        updateCard.style.display = "none";
                    }

                    function openUpdateForm() {
                        var updateForm = document.getElementById("update-profile-form");
                        updateForm.style.display = "block";
                        closeProfileCard();
                    }

                    function fetchUserProfile() {
                        var xhr = new XMLHttpRequest();
                        xhr.open('GET', '/profile', true);
                        xhr.onreadystatechange = function() {
                            if (xhr.readyState == 4 && xhr.status == 200) {
                                var response = JSON.parse(xhr.responseText);
                                if (response.userData) {
                                    document.getElementById('full_name').innerText = response.userData.full_name;
                                    document.getElementById('email').innerText = response.userData.email;
                                    document.getElementById('profile-image-large').src = response.profilePicture;
                                } else {
                                    console.error("Failed to fetch user data");
                                }
                            }
                        };
                        xhr.send();
                    }

                    document.getElementById('updateForm').addEventListener('submit', function(event) {
                        event.preventDefault();

                        var formData = new FormData();
                        formData.append('new_full_name', document.getElementById('new_full_name').value);
                        formData.append('uploadfile', document.getElementById('uploadfile').files[0]);

                        var xhr = new XMLHttpRequest();
                        xhr.open('POST', '/updateProfile', true);
                        xhr.onreadystatechange = function() {
                            if (xhr.readyState == 4) {
                                if (xhr.status == 200) {
                                    var response = JSON.parse(xhr.responseText);
                                    if (response.success) {
                                        document.getElementById('full_name').innerText = response.userData.full_name;
                                        document.getElementById('profile-image-large').src = response.profilePicture;
                                        closeUpdateCard();
                                        openProfileCard();
                                    } else {
                                        console.error("Failed to update user profile");
                                    }
                                } else {
                                    console.error("Failed to update user profile, status: " + xhr.status);
                                }
                            }
                        };
                        xhr.send(formData);
                    });

                    function logout() {
                        var xhr = new XMLHttpRequest();
                        xhr.onreadystatechange = function() {
                            if (xhr.readyState === XMLHttpRequest.DONE) {
                                if (xhr.status === 200) {
                                    window.location.href = 'firstPage.html';
                                } else {
                                    console.error('Logout request failed');
                                }
                            }
                        };
                        xhr.open('GET', 'logout.php?logout=true', true);
                        xhr.send();
                    }

                    document.getElementById('logoutButton').addEventListener('click', function(event) {
                        event.preventDefault();

                        fetch('/logout')
                            .then(response => {
                                if (response.redirected) {
                                    window.location.href = response.url;
                                } else {
                                    console.error('Logout failed');
                                }
                            })
                            .catch(error => {
                                console.error('Error:', error);
                            });
                    });

                    $(document).ready(function() {

        <script>
            class ResponseManager {
                constructor(containerSelector) {
                    this.container = document.querySelector(containerSelector);
                }

                displayResponse(responseText) {
                    const responseWrapper = document.createElement('div');
                    responseWrapper.classList.add('response-wrapper');
                    responseWrapper.style.position = 'relative';

                    const responseContainer = document.createElement('div');
                    responseContainer.classList.add('response-container');

                    const responseParagraph = document.createElement('p');
                    responseParagraph.textContent = responseText;
                    responseParagraph.classList.add('response-text');

                    const speakerButton = document.createElement('button');
                    speakerButton.classList.add('speaker-button');
                    speakerButton.textContent = '🔊';
                    speakerButton.onclick = () => this.speak(responseText);

                    const markAsFavoriteBtn = document.createElement('button');
                    markAsFavoriteBtn.classList.add('mark-as-favorite-btn');
                    markAsFavoriteBtn.innerHTML = '&#10084;';
                    markAsFavoriteBtn.style.backgroundColor = 'rgb(255, 0, 60)';
                    markAsFavoriteBtn.style.color = 'white';
                    markAsFavoriteBtn.style.padding = '2px 4px';
                    markAsFavoriteBtn.style.border = 'none';
                    markAsFavoriteBtn.style.borderRadius = '10px';
                    markAsFavoriteBtn.style.cursor = 'pointer';
                    markAsFavoriteBtn.addEventListener('click', () => this.markAsFavorite(markAsFavoriteBtn));

                    responseContainer.appendChild(responseParagraph);
                    responseContainer.appendChild(speakerButton);
                    responseWrapper.appendChild(responseContainer);
                    responseWrapper.appendChild(markAsFavoriteBtn);

                    this.container.appendChild(responseWrapper);
                    this.speak(responseText);
                }

                speak(text) { // web speech API
                    const speechSynthesis = window.speechSynthesis;
                    if (speechSynthesis) {
                        const utterance = new SpeechSynthesisUtterance(text);
                        speechSynthesis.speak(utterance);
                    } else {
                        console.error("Speech Synthesis not supported in this browser.");
                    }
                }

                markAsFavorite(button) {
                    const messageContent = button.parentElement.querySelector('.response-text');
                    const messageText = messageContent.textContent.trim();

                    fetch('/addToFavorites', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                message: messageText
                            })
                        })
                        .then(response => {
                            if (!response.ok) {
                                throw new Error('Failed to mark message as favorite');
                            }
                            const popup = document.createElement('div');
                            popup.classList.add('popup');
                            popup.textContent = 'Message marked as favorite';
                            document.body.appendChild(popup);
                            setTimeout(() => {
                                popup.remove();
                            }, 2000); // Success message for 2 seconds
                        })
                        .catch(error => {
                            console.error('Error marking message as favorite:', error);
                            // Handle error appropriately
                        });
                }
            }

            const responseManager = new ResponseManager('.audio-container');

                        }
                    })
                    .then(data => {
                        responseManager.displayResponse(data);

                        addMessage(data, 'CalmBot');
                        document.getElementById('result').textContent = '';
                    })
                    .catch(error => {
                        console.error("Error:", error);

            }

        <script>

        <script>
            const welcomeMessage = document.getElementById('welcomeMessage');
            const recordBtn = document.querySelector(".record");
            const stopRecordBtn = document.querySelector(".stop-record");
            const sendBtn = document.querySelector(".ellipse-1");
            const inputBar = document.querySelector(".InputBar");

            let recorder;
            let audioChunks = [];
            let chatHistory = {};
            let ongoingConversation = [];
            let lastUsedThread = parseInt(localStorage.getItem('lastUsedThread')) || 0;
            let isNewChat = localStorage.getItem('isNewChat') === 'true';
            let currentThread = parseInt(localStorage.getItem('currentThread')) || null;
            let recognition;
            let recording = false;
            let firstMessageSent = false;

            function sendFirstMessage() {
                firstMessageSent = true;
            }

            function hideWelcomeMessage() {
                if (firstMessageSent) {
                    welcomeMessage.style.display = 'none';
                }
            }

            sendBtn.addEventListener('click', function() {
                if (!firstMessageSent) {
                    sendFirstMessage();
                    hideWelcomeMessage();
                }
            });

            window.onload = function() {
                const savedChatHistory = localStorage.getItem('chatHistory');
                const savedOngoingConversation = localStorage.getItem('ongoingConversation');

                if (savedChatHistory) {
                    chatHistory = JSON.parse(savedChatHistory);
                    showChatHistory();
                }
                if (savedOngoingConversation) {
                    ongoingConversation = JSON.parse(savedOngoingConversation);
                    displayOngoingConversation();
                } else if (currentThread in chatHistory) {
                    ongoingConversation = chatHistory[currentThread];
                    displayOngoingConversation();
                } else {
                    currentThread = ++lastUsedThread;
                    localStorage.setItem('lastUsedThread', lastUsedThread);
                    localStorage.setItem('currentThread', currentThread);
                }
            }

            function showChatHistory() {
                const chatHistoryDiv = document.getElementById('chatHistory');
                chatHistoryDiv.innerHTML = '';
                for (let threadId in chatHistory) {
                    const div = document.createElement('button');
                    div.classList.add('thread');
                    div.textContent = `Chat ${parseInt(threadId) + 1}`;
                    div.onclick = function() {
                        currentThread = parseInt(threadId);
                        ongoingConversation = chatHistory[currentThread];
                        localStorage.setItem('currentThread', currentThread);
                        displayOngoingConversation();
                    };
                    chatHistoryDiv.appendChild(div);
                }
                chatHistoryDiv.style.display = 'block';
            }
            //it add message both in ongoingconversation and current thread in chat history
            function addMessage(message, sender) {
                if (!chatHistory[currentThread]) {
                    chatHistory[currentThread] = [];
                }

                if (message instanceof Blob) {
                    const reader = new FileReader();
                    reader.onload = function() {
                        const base64Data = reader.result.split(',')[1];
                        const messageData = {
                            message: base64Data,
                            sender: sender,
                            isVoice: true
                        };
                        chatHistory[currentThread].push(messageData);
                        ongoingConversation.push(messageData);
                        saveChatState();
                    };
                    reader.readAsDataURL(message);
                } else {
                    const messageData = {
                        message: message,
                        sender: sender,
                        isVoice: false
                    };
                    chatHistory[currentThread].push(messageData);
                    ongoingConversation.push(messageData);
                    saveChatState();
                }
            }

            function displayOngoingConversation() {
                const recordedAudioContainer = document.getElementById('recordedAudioContainer');
                recordedAudioContainer.innerHTML = '';
                ongoingConversation.forEach((item) => {
                    const div = document.createElement('div');
                    div.classList.add('audio-wrapper');
                    const senderText = document.createElement('p');
                    senderText.textContent = `${item.sender}:`;
                    if (item.isVoice) {
                        const blob = base64ToBlob(item.message, 'audio/wav');
                        const audioElement = document.createElement('audio');
                        audioElement.controls = true;
                        audioElement.src = URL.createObjectURL(blob);
                        div.appendChild(senderText);
                        div.appendChild(audioElement);
                    } else {
                        const messageText = document.createElement('p');
                        messageText.textContent = item.message;
                        messageText.classList.add('response-text');

                        const responseContainer = document.createElement('div');
                        responseContainer.classList.add('response-container');
                        responseContainer.appendChild(messageText);

                        const speakerButton = document.createElement('button');
                        speakerButton.classList.add('speaker-button');
                        speakerButton.textContent = '🔊';
                        speakerButton.onclick = () => responseManager.speak(item.message);

                        responseContainer.appendChild(speakerButton);
                        div.appendChild(responseContainer);
                    }
                    recordedAudioContainer.appendChild(div);
                });
            }

            function displayThreadInAudioContainer(threadId) {
                const recordedAudioContainer = document.getElementById('recordedAudioContainer');
                recordedAudioContainer.innerHTML = '';
                const thread = chatHistory[threadId];
                thread.forEach((item) => {
                    const div = document.createElement('div');
                    div.classList.add('audio-wrapper');
                    const senderText = document.createElement('p');
                    senderText.textContent = `${item.sender}:`;
                    div.appendChild(senderText);
                    if (item.isVoice) {
                        const blob = base64ToBlob(item.message, 'audio/wav');
                        const audioElement = document.createElement('audio');
                        audioElement.controls = true;
                        audioElement.src = URL.createObjectURL(blob);
                        div.appendChild(audioElement);
                    } else {
                        const messageText = document.createElement('p');
                        messageText.textContent = item.message;
                        messageText.classList.add('response-text');

                        const responseContainer = document.createElement('div');
                        responseContainer.classList.add('response-container');
                        responseContainer.appendChild(messageText);

                        const speakerButton = document.createElement('button');
                        speakerButton.classList.add('speaker-button');
                        speakerButton.textContent = '🔊';
                        speakerButton.onclick = () => responseManager.speak(item.message);

                        responseContainer.appendChild(speakerButton);
                        div.appendChild(responseContainer);
                    }
                    recordedAudioContainer.appendChild(div);
                });
            }

            function base64ToBlob(base64Data, contentType) {
                contentType = contentType || '';
                const sliceSize = 1024;
                const byteCharacters = atob(base64Data); // base64 to binary conversion
                const byteArrays = [];
                for (let offset = 0; offset < byteCharacters.length; offset += sliceSize) {
                    const slice = byteCharacters.slice(offset, offset + sliceSize);
                    const byteNumbers = new Array(slice.length);
                    for (let i = 0; i < slice.length; i++) {
                        byteNumbers[i] = slice.charCodeAt(i);
                    }
                    const byteArray = new Uint8Array(byteNumbers); //represant binary data
                    byteArrays.push(byteArray);
                }
                const blob = new Blob(byteArrays, {
                    type: contentType
                });
                return blob;
            }

            function createNewChatPage() {
                if (ongoingConversation.length > 0) {
                    chatHistory[currentThread] = ongoingConversation; //store ongoingcoversation in current thread as chat history
                    saveChatState();
                    ongoingConversation = [];
                    localStorage.removeItem('ongoingConversation');
                }
                lastUsedThread++;
                currentThread = lastUsedThread;
                localStorage.setItem('lastUsedThread', lastUsedThread);
                localStorage.setItem('currentThread', currentThread);
                isNewChat = true;
                localStorage.setItem('isNewChat', isNewChat);
                showChatHistory();
                clearRecordedAudio();
            }
            //store chathistory, ongoingconversation and currentThread in local storage 
            function saveChatState() {
                localStorage.setItem('chatHistory', JSON.stringify(chatHistory));
                localStorage.setItem('ongoingConversation', JSON.stringify(ongoingConversation));
                localStorage.setItem('currentThread', currentThread);
            }

            function clearRecordedAudio() {
                const recordedAudioContainer = document.getElementById('recordedAudioContainer');
                recordedAudioContainer.innerHTML = '';
            }

            function clearChatHistory() {
                localStorage.removeItem('chatHistory');
                localStorage.removeItem('lastUsedThread');
                localStorage.removeItem('ongoingConversation');
                localStorage.removeItem('currentThread');
                localStorage.removeItem('isNewChat');
                chatHistory = {};
                ongoingConversation = [];
                lastUsedThread = 0;
                currentThread = null;
                isNewChat = true;
                const chatHistoryDiv = document.getElementById('chatHistory');
                chatHistoryDiv.style.display = 'none';
                clearRecordedAudio();
            }
            // first created empty audio chunks array
            function startRecording() {
                navigator.mediaDevices.getUserMedia({ // request access to start microphone
                        audio: true
                    })
                    .then(stream => {
                        recorder = new MediaRecorder(stream);
                        recorder.ondataavailable = e => {
                            audioChunks.push(e.data);
                        };
                        recorder.onstop = () => {
                            const audioBlob = new Blob(audioChunks, {
                                type: 'audio/wav'
                            });
                            addMessage(audioBlob, 'User');
                            displayRecordedAudio(audioBlob);
                            audioChunks = [];
                        };
                        recorder.start();
                        document.getElementById('listeningLabel').style.display = 'block'; // Show the listening label

                    })
                    .catch(err => {
                        console.error('Error accessing microphone:', err);
                    });
            }

            function stopRecording() {
                if (recorder && recorder.state === 'recording') {
                    recorder.stop();
                    recorder = null;
                }
                if (recognition) {
                    recognition.stop();
                }
                recordBtn.classList.remove("recording");
                recording = false;
            }

            /*function displayRecordedAudio(audioBlob) {
                const recordedAudioContainer = document.getElementById('recordedAudioContainer');
                const audioElement = document.createElement('audio');
                audioElement.controls = true;
                audioElement.src = URL.createObjectURL(audioBlob);
                recordedAudioContainer.appendChild(audioElement);
                recordedAudioContainer.style.overflowY = 'auto'; // Enable vertical scrolling
                recordedAudioContainer.style.maxHeight = '200px'; // Set maximum height
                recordedAudioContainer.style.overflowX = 'hidden';
            }*/


            function displayRecordedAudio(audioBlob) {
                const recordedAudioContainer = document.getElementById('recordedAudioContainer');
                const audioElement = document.createElement('audio');
                audioElement.controls = true;
                audioElement.src = URL.createObjectURL(audioBlob);
                const div = document.createElement('div');
                div.classList.add('audio-wrapper');
                div.appendChild(audioElement);
                recordedAudioContainer.appendChild(div);
            }

            function toggleRecording() {
                if (!recording) {
                    startRecording();
                    recording = true;
                    speechToText();
                } else {
                    stopRecording();
                    recording = false;
                }
            }

            function sendVoiceMessage() {
                stopRecording();
                recording = false;
                document.getElementById('listeningLabel').style.display = 'none';
                const text = document.getElementById('result').textContent.trim();
                if (text !== "") {
                    sendToDatabase(text);
                }
                document.getElementById('result').textContent = "";
                sendMessage();
            }


            function sendToDatabase(text) {
                if (text.trim() !== "") {
                    // Send the text to the server using fetch API
                    fetch("/getResponse", {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/x-www-form-urlencoded"
                            },
                            body: "text=" + encodeURIComponent(text)
                        })
                        .then(response => {
                            if (response.ok) {
                                console.log("Text sent successfully.");
                                // Clear the result section after sending the text
                                result.innerHTML = "";
                            } else {
                                console.error("Failed to send text.");
                            }
                        })

                    .catch(error => {
                        console.error("Error:", error);
                    });
                }
            }

            sendBtn.addEventListener("click", () => {
                const textToSend = result.innerText.trim();
                sendToDatabase(textToSend);
                stopRecording();
            });

            const clearBtn = document.querySelector(".clear");
            clearBtn.addEventListener("click", () => {
                result.innerHTML = "";
                const computedHeight = window.getComputedStyle(result).height;
                result.style.height = computedHeight;
            });

            /*fetch("/getResponse") // send get request
                .then(response => response.text())
                .then(data => {
                    console.log("Fetched data:", data);
                    result.innerHTML = data;
                })
                .catch(error => {
                    console.error("Error fetching data:", error);
                });*/

            function speechToText() {
                try {
                    recognition = new(window.SpeechRecognition || window.webkitSpeechRecognition)();
                    recognition.interimResults = true;
                    recognition.onresult = (event) => {
                        const speechResult = event.results[0][0].transcript;
                        if (event.results[0].isFinal) {
                            document.getElementById('result').innerHTML += " " + speechResult;
                        }
                    };
                    recognition.onend = () => {
                        if (recording) {
                            recognition.start();
                        }
                    };
                    recognition.start();
                } catch (error) {
                    console.log(error);
                }
            }
        </script>
