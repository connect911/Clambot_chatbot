<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="Logo calmbot remove bg.png">
    <link href="https://fonts.googleapis.com/css2?family=Lato&family=Oswald&family=Ubuntu&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inknut+Antiqua:wght@300;400;500;600;700;800;900&family=Lato&family=Oswald&family=Overlock+SC&family=Rubik+Doodle+Shadow&family=Ubuntu&family=Unkempt:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/d954d2bfe4.js" crossorigin="anonymous"></script>
    <title>Landing Page</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        
        .header {
            display: flex;
            align-items: center;
            padding: 10px;
            color: white;
            margin: 22px;
        }
        
        .logo {
            width: auto;
            height: 60px;
            margin-right: 10px;
            border-radius: 39px;
        }
        
        .app-name {
            font-size: 20px;
            font-weight: bold;
            font-family: 'Lato', sans-serif;
        }
        
        h2 {
            font-family: 'Lato', sans-serif;
            color: white;
            margin-top: 5rem;
            margin-left: 5rem;
            overflow: hidden;
        }
        
        .yellow-background {
            color: rgb(19, 19, 24);
            background-color: yellow;
            /* Set the background color as needed */
            display: inline-block;
            /* Make the background color only cover the content */
            white-space: nowrap;
            /* Prevent line breaks */
            animation: typing 1s steps(13) forwards;
            /* Adjust duration and steps as needed */
        }
        
        @keyframes typing {
            from {
                width: 0;
                /* Start with zero width */
            }
            to {
                width: 11%;
                /* End with full width */
            }
        }
        
        .background-container {
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.7)), url('chatbots.webp');
            background-repeat: no-repeat;
            background-size: cover;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: -1;
        }
        
        .lines-container {
            position: fixed;
            top: 40px;
            right: 50px;
            z-index: 1;
            cursor: pointer;
        }
        
        .line {
            width: 30px;
            height: 3px;
            background-color: rgb(201, 196, 230);
            margin: 5px 0;
        }
        
        .menu {
            position: fixed;
            top: 30px;
            right: -100%;
            text-align: center;
            color: white;
            display: none;
            transform: translate(-30%, 0%);
            transition: transform 2s ease;
            animation-name: example;
            animation-duration: 1.5s;
        }
        
        @keyframes example {
            from {
                transform: translate(0px, 0px);
            }
            to {
                transform: translate(-30%, 0px);
            }
        }
        
        .menu a {
            color: rgb(217, 212, 243);
            text-decoration: none;
            margin: 10px;
            font-size: 18px;
            padding: 5px;
            position: relative;
            display: inline-block;
            font-size: 16px;
            color: white;
            overflow: hidden;
        }
        
        .menu a::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: white;
            transform-origin: bottom right;
            transform: scaleX(0);
            transition: transform 1s ease;
        }
        
        .menu a:hover::before {
            transform-origin: bottom left;
            transform: scaleX(1);
        }
        
        li {
            color: white;
            list-style-type: none;
        }
        
        ul {
            margin-left: 3rem;
        }
        
        h1 {
            line-height: 15%;
            color: white;
            font-size: 4.5em;
            margin-left: 5rem;
            font-family: "Overlock SC", sans-serif;
            font-weight: 400;
            font-style: normal;
        }
        
        .point_list ul {
            line-height: 30%;
            list-style: none;
            padding: 0;
            margin-left: 5rem;
        }
        
        .point_list li {
            margin-bottom: 10px;
        }
        
        .material-symbols-outlined {
            vertical-align: middle;
            /* You can also use 'top' instead of 'middle' */
            margin-right: 5px;
            /* Adjust the margin to your preference */
        }
        
        .get {
            cursor: pointer;
            margin-left: 5rem;
            font-size: 22px;
            background-color: transparent;
            color: yellow;
            font-family: 'Lato', sans-serif;
            border: 2px solid yellow;
            border-radius: 10px;
            text-shadow: #f8b92f;
            padding: 8px 16px;
            margin-bottom: 140px;
        }
        
        .get:hover {
            font-size: 24px;
        }
        
        .dropdown {
            display: inline-block;
        }
        
        .dropbtn {
            text-decoration: none;
            font-size: 17px;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            color: black;
        }
        
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #f9f9f9;
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0, 0, 0, 0.2);
            z-index: 1;
        }
        
        .dropdown-content a {
            color: black;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
        }
        
        .dropdown-content a:hover {
            background-color: #f1f1f1;
        }
        
        .dropdown:hover .dropdown-content {
            display: block;
        }
        
        .button.active {
            color: yellow;
        }
        
        h4 {
            margin-top: 2px;
            font-family: 'Lato', sans-serif;
        }
        
        i {
            color: black;
            font-size: 2rem;
        }
        
        .icon {
            margin-bottom: 4px;
            word-spacing: 10px;
        }
        
        .contact-support {
            font-family: Arial, sans-serif;
            background-color: #b4babb;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-left: 30px;
            margin-right: 30px;
            margin-bottom: 10px;
        }
        
        .contact-support h2 {
            color: #063c4b;
            border-bottom: 2px solid #063c4b;
            padding-bottom: 10px;
            margin-top: 3px;
            margin-left: 2px;
        }
        
        .contact-support p {
            font-size: 1.1em;
            color: #063c4b;
        }
        
        .contact-support a {
            color: #051a28;
            text-decoration: none;
        }
        
        .contact-support h3 {
            color: #063c4b;
            margin-top: 20px;
        }
        
        .contact-support ul {
            list-style: none;
            padding: 0;
            display: flex;
            gap: 15px;
        }
        
        .contact-support ul li {
            flex: 1;
        }
        
        .contact-support ul li a {
            text-decoration: none;
            display: flex;
            align-items: center;
            color: #333;
        }
        
        .contact-support ul li a img {
            width: 24px;
            height: 24px;
            margin-right: 8px;
        }
    </style>
</head>

<body>

        <a href="about.html">About</a>

    <h2>

    <h1>Our Happiness</h1>
    <h1>lies in your</h1>
    <h1 class="peace ">Peace.</h1>

        <h3>Follow Us</h3>

            <li>
                <a href="https://www.facebook.com/share/G81P7ZRaMCUdFV5G/?mibextid=qi2Omg " target="_blank ">
                    <img src="fb.png " alt="Facebook ">
                    <span>Facebook</span>

    <script>
        document.addEventListener("DOMContentLoaded ", function() {
            var currentPage = window.location.pathname.split("/ ").pop();

            // Remove 'active' class from all menu items
            var menuItems = document.querySelectorAll('.menu a');
            menuItems.forEach(function(menuItem) {
                menuItem.classList.remove('active');
            });

            // Add 'active' class to the corresponding menu item
            var homeLink = document.querySelector('.menu a[href$="firstPage.html "]');
            if (currentPage === " " || currentPage === "firstPage.html ") {
                homeLink.classList.add('active');
            }
        });

        function toggleMenu() {
            var menu = document.getElementById("menu");
            menu.style.display = (menu.style.display === "block") ? "none" : "block";
            menu.style.right = (menu.style.right === "0px") ? "-250px" : "0px";
        }
    </script>
</body>
