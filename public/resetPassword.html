<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="Logo calmbot remove bg.png">
    <link href="https://fonts.googleapis.com/css2?family=Lato&family=Oswald&family=Ubuntu&display=swap" rel="stylesheet">
    <title>Reset Password</title>
    <style>
        body {
            background-image: linear-gradient( rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('bot\ background.jpg');
            background-repeat: no-repeat;
            background-size: cover;
            height: 100vh;
        }
        
        .page {
            background-color: rgba(214, 228, 218, 0.397);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            margin: 30em;
            margin-top: 5rem;
            border-radius: 18px;
        }
        
        #email {
            height: 39px;
            width: 200px;
            padding-left: 12px;
            border: 2px solid rgb(18, 19, 82);
            border-radius: 12px;
        }
        
        #new_pass {
            height: 39px;
            width: 200px;
            padding-left: 12px;
            border: 2px solid rgb(18, 19, 82);
            border-radius: 12px;
        }
        
        #pass {
            height: 39px;
            width: 200px;
            padding-left: 12px;
            border: 2px solid rgb(18, 19, 82);
            border-radius: 12px;
        }
        
        #submit {
            height: 35px;
            width: 120px;
            margin-left: 3rem;
            border-radius: 12px;
            background-color: rgba(17, 60, 100, 0.788);
            color: white;
            border: none;
        }
        
        h1 {
            font-family: 'Lato', sans-serif;
            color: black;
        }
        
        .logo {
            height: 100px;
            width: auto;
            margin: 0 auto 20px;
            display: block;
            margin-top: 0;
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="form">
            <form action="/resetPassword" method="POST">
                <input type="hidden" name="password_token" id="password_token">
                <img src="reset password.svg" class="logo">
                <h1>Reset Password</h1>
                <label for="email">
                    <input type="email" name="email" id="email" placeholder="Email" required>
                </label><br><br>
                <label for="new_pass">
                    <input type="password" name="new_pass" id="new_pass" placeholder="New password" required>
                </label><br><br>
                <label for="pass">
                    <input type="password" name="pass" id="pass" placeholder="Confirm password" required>
                </label><br><br>
                <input type="submit" name="reset_submit" id="submit"><br>
            </form>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const email = urlParams.get('email');
            if (token) {
                document.getElementById('password_token').value = token;
            }
            if (email) {
                document.getElementById('email').value = email;
            }
        });
    </script>

</body>

</html>
